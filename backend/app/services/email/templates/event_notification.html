<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ event_title }}</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; padding: 20px;">
  <table width="100%" cellpadding="0" cellspacing="0" style="max-width: 600px; margin: 0 auto; background-color: #ffffff; border-radius: 8px; overflow: hidden;">
    <tr>
      <td style="background-color: #1a73e8; padding: 24px; text-align: center;">
        <h1 style="color: #ffffff; margin: 0; font-size: 22px;">{{ event_title }}</h1>
      </td>
    </tr>
    <tr>
      <td style="padding: 24px;">
        <p style="font-size: 16px; color: #333333;">Hi {{ student_name }},</p>
        <p style="font-size: 15px; color: #333333; line-height: 1.6;">{{ notification_message }}</p>
        <table cellpadding="0" cellspacing="0" style="width: 100%; margin-top: 16px; border-collapse: collapse;">
          <tr>
            <td style="padding: 8px 0; color: #666666; font-size: 14px; width: 120px;">Date</td>
            <td style="padding: 8px 0; color: #333333; font-size: 14px;">{{ event_date }}</td>
          </tr>
          <tr>
            <td style="padding: 8px 0; color: #666666; font-size: 14px;">Department</td>
            <td style="padding: 8px 0; color: #333333; font-size: 14px;">{{ department }}</td>
          </tr>
        </table>
      </td>
    </tr>
    <tr>
      <td style="background-color: #f0f0f0; padding: 16px; text-align: center;">
        <p style="font-size: 12px; color: #999999; margin: 0;">This is an automated notification from EduAgent. Please do not reply to this email.</p>
      </td>
    </tr>
  </table>
</body>
</html>
