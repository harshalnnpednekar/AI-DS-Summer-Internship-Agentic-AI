version: '3.8'

services:
  db:
    image: postgres:16
    container_name: omnisync_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: event_notification_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d event_notification_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: omnisync_backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/event_notification_db
      SECRET_KEY: change-me-in-production-supersecretkey123
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      JWT_ALGORITHM: HS256
      DEBUG: "false"
      APP_NAME: OmniSync
      PROJECT_NAME: "OmniSync Academic Platform"
      VERSION: "1.0.0"
      ALLOWED_ORIGINS: '["*"]'
      SMTP_SERVER: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_USE_TLS: "True"
      SEED_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: omnisync_frontend
    environment:
      VITE_API_URL: "http://backend:8000"
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  postgres_data:

networks:
  app_network:
    driver: bridge
