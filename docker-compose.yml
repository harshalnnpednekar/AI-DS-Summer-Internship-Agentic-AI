version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_api
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:radhe123@host.docker.internal:5432/event_notification
      API_PORT: 8000
    ports:
      - "8000:8000"
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: scheduler_agent
    env_file:
      - ./scheduler/.env
    environment:
      API_BASE_URL: http://backend:8000
      EMAIL_SERVICE_URL: http://email_service:8002
      SCHEDULER_INTERVAL_MINUTES: 5
      NOTIFICATION_WINDOW_DAYS: 3
      GROQ_API_KEY: ${GROQ_API_KEY}
      LOG_LEVEL: INFO
      MOCK_API_ENABLED: "false"
    ports:
      - "8001:8001"
    depends_on:
      - backend
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  email_service:
    build:
      context: ./email_service
      dockerfile: Dockerfile
    container_name: email_service
    environment:
      API_BASE_URL: http://backend:8000
      SMTP_SERVER: host.docker.internal
      SMTP_PORT: 1025
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      SMTP_USE_TLS: "false"
      LOG_LEVEL: INFO
    ports:
      - "8002:8002"
    depends_on:
      - backend
    networks:
      - app_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  app_network:
    driver: bridge
